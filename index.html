<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Skills Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
    body{
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        background-image: url('paper.jpg');
        background-repeat: no-repeat;
        background-size: cover;
    }

</style>
<body>
    <center>
    <div class="container" style="width: 400px; height: 450px; background-color: rgb(255, 255, 255); margin-top: 150px; border-radius: 20px; box-shadow: rgba(0, 0, 0, 0.15) 1.95px 1.95px 2.6px; padding: 20px;">
    
    <h1 style="padding-top: 10px; color: rgb(181, 198, 227);"><b>Login</b></h1>
    
    <br>

    <form onsubmit="CheckPassword(); return false;">
      
      <div class="col">
        <label style="font-size: 20px; color: rgb(123, 139, 164);"><b>Username</b></label>
        <input type="text" id="username" class="form-control" placeholder="Input Username..." style="color: rgb(154, 170, 201);">

        <br>

        <label style="font-size: 20px; color: rgb(123, 139, 164);"><b>Password</b></label>
        <input type="password" id="password" class="form-control" placeholder="Input Password..." style="color: rgb(154, 170, 201);"> 

<br>
        <div class="form-check mb-3">
            <input type="checkbox" class="form-check-input" id="checkbox">
            <label class="form-check-label" for="checkbox" style="margin-right: 200px; color: rgb(38, 62, 80);"><i>Remember password</i></label>
               <p id="display"></p>
    </div>
    <br>
        <p id="display" style="font-size: 30px; color: rgb(54, 90, 112);"></p>
        <input style="background-color: rgb(63, 81, 111); color: white; border-color:rgb(63, 81, 111);"  type="button" name="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">


         <input style="background-color: rgb(214, 214, 214); border-color:rgb(214, 214, 214);"  type="reset" name="button" id="cancel" value="Cancel" class="btn btn-info rounded-5" >
    </form>

    
    <script>
        let attempt_counter = 0;


        function authenticate(){
            let username = document.getElementById("username").value;
            let pwd = document.getElementById("password").value;
            let granted = "Welcome back, " + username + "!";
            let denied = "Access denied. Account locked after 3 attempts!";


        while (attempt_counter < 3) {
        if (username === "nosomei" && pwd === "ggwp") {
            alert(granted);
            attempt_counter = 0; // reset attempts after successful login
            document.getElementById("display").innerHTML = "";
            window.location.href = "notebooks.html";


            break; // stop loop
        }


        else {
            attempt_counter++;
           alert("Invalid username and/or password. Attempt " + attempt_counter + " of 3. ");
            break; // stop loop for this click
        }


        }
        if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true; // disable button
            }
        }
    </script>
    </div>
    </div>
    </div>
</body>

<br>
</body>
</html>
